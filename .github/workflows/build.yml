name: build

# push is main-only: a PR branch already gets the pull_request run; the bare
# `push:` trigger duplicated every matrix (2x cost, 2x flake surface).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # The backend is Qt-free now (Electron + anyplotlib); no QT_QPA / X11 needed.
  MPLBACKEND: agg
  PYTEST_ADDOPTS: "--timeout=600 -vv --durations=10"

jobs:
  test:
    name: ${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        # Full history + tags so setuptools_scm derives a real version
        # (a shallow checkout has no tags -> 0.0.postN.devN).
        with:
          fetch-depth: 0

      # uv everywhere (project rule). Resolves the git-pinned hyperspy /
      # rosettasciio / anyplotlib forks + the CPU torch wheel from the lock.
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pinned: resolving "latest" hits the GitHub releases API, which
          # took out every CI leg during the 2026-07 API outage.
          version: "0.10.11"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install (locked) + tests extra
        run: uv sync --frozen --extra tests --python ${{ matrix.python-version }}

      - name: Versions
        run: |
          uv run python -V
          uv pip list

      # The single canonical Qt-free suite (testpaths=spyde/tests/migrated).
      # GPU tests skip themselves without CUDA/MPS. No display server required.
      - name: Run tests
        run: uv run pytest spyde/tests/migrated --cov=spyde --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ github.repository_owner == 'directelectron' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Renderer/main TypeScript typecheck ─────────────────────────────────────
  # Pure TS compile (tsc --noEmit) of the Electron main + renderer. No Python /
  # display server needed, so it's a fast standalone job that gates the PR.
  typecheck:
    name: electron-typecheck (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        working-directory: electron
        run: npm run typecheck

  # ── Electron e2e (Playwright) ──────────────────────────────────────────────
  # Runs the DEFAULT 'electron' project only (synthetic + bundled data, no
  # network). The opt-in 'electron-real' project (real pyxem downloads + the
  # screenshot generator) is NOT run here.
  #
  # OS choice: ubuntu-latest + xvfb. Electron headless CI is cheapest/standard on
  # Linux, and the default project uses only synthetic/bundled data (no Windows-
  # specific reader paths exercised). In dev mode the app spawns the backend via
  # `uv run python -m spyde`, so the job sets up uv + pre-syncs the env.
  #
  # Best-effort for now (continue-on-error): the e2e launches a real Electron app
  # + Dask LocalCluster and has not yet been validated green on a hosted runner.
  # Drop continue-on-error once it's confirmed stable in CI.
  # Sharded ×3: the suite is deliberately serial WITHIN a run (one Electron +
  # Dask cluster at a time — see playwright.config.ts), so wall-clock scales
  # only by splitting the spec files across independent runners. Each shard is
  # still fully serial, so the cluster-contention flakiness that forced
  # workers:1 cannot recur across shards (separate VMs). Playwright balances
  # shards by FILE COUNT, not duration — ×2 measured 22.7m vs 10.0m — so ×3
  # keeps the worst shard under ~15m even while the known-failing specs pay
  # retry + app-reboot tax (2026-07-11: 16 failing tests account for ~23 of
  # the 33 spec-minutes; fixing them is the real speedup).
  e2e:
    name: electron-e2e (ubuntu, shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # The e2e launches the real Python backend (`uv run python -m spyde`).
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pinned: resolving "latest" hits the GitHub releases API, which
          # took out every CI leg during the 2026-07 API outage.
          version: "0.10.11"
          enable-cache: true

      - name: Pre-sync the Python backend env
        run: uv sync --frozen --extra tests

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Install Playwright browsers
        working-directory: electron
        run: npx playwright install --with-deps chromium

      # test:build = electron-vite build && playwright test. Pin --project=electron
      # so ONLY the synthetic/bundled-data project runs; without it Playwright runs
      # every project, including the heavy real-data 'electron-real' (pyxem
      # downloads + screenshot writes) that is meant to be opt-in.
      - name: Run Electron e2e
        working-directory: electron
        run: xvfb-run --auto-servernum npm run test:build -- --project=electron --shard=${{ matrix.shard }}/3

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: electron/playwright-report/
          if-no-files-found: ignore

# NOTE: packaging the desktop app (electron-builder + the uv Python sidecar) is a
# separate, tag-triggered release workflow — see electron/PACKAGING.md. It is not
# wired here because it needs per-OS signing secrets / vendored uv binaries.
