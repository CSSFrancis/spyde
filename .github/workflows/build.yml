name: build

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # The backend is Qt-free now (Electron + anyplotlib); no QT_QPA / X11 needed.
  MPLBACKEND: agg
  PYTEST_ADDOPTS: "--timeout=600 -vv --durations=10"

jobs:
  test:
    name: ${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        # Full history + tags so setuptools_scm derives a real version
        # (a shallow checkout has no tags → 0.0.postN.devN).
        with:
          fetch-depth: 0

      # uv everywhere (project rule). Resolves the git-pinned hyperspy /
      # rosettasciio / anyplotlib forks + the CPU torch wheel from the lock.
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install (locked) + tests extra
        run: uv sync --frozen --extra tests --python ${{ matrix.python-version }}

      - name: Versions
        run: |
          uv run python -V
          uv pip list

      # The single canonical Qt-free suite (testpaths=spyde/tests/migrated).
      # GPU tests skip themselves without CUDA/MPS. No display server required.
      - name: Run tests
        run: uv run pytest spyde/tests/migrated --cov=spyde --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ github.repository_owner == 'directelectron' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Electron e2e (Playwright) ──────────────────────────────────────────────
  # Runs the DEFAULT 'electron' project only (synthetic + bundled data, no
  # network). The opt-in 'electron-real' project (real pyxem downloads + the
  # screenshot generator) is NOT run here.
  #
  # OS choice: ubuntu-latest + xvfb. Electron headless CI is cheapest/standard on
  # Linux, and the default project uses only synthetic/bundled data (no Windows-
  # specific reader paths exercised). In dev mode the app spawns the backend via
  # `uv run python -m spyde`, so the job sets up uv + pre-syncs the env.
  #
  # Best-effort for now (continue-on-error): the e2e launches a real Electron app
  # + Dask LocalCluster and has not yet been validated green on a hosted runner.
  # Drop continue-on-error once it's confirmed stable in CI.
  e2e:
    name: electron-e2e (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The e2e launches the real Python backend (`uv run python -m spyde`).
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Pre-sync the Python backend env
        run: uv sync --frozen --extra tests

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Install Playwright browsers
        working-directory: electron
        run: npx playwright install --with-deps chromium

      # test:build = electron-vite build && playwright test (default project).
      - name: Run Electron e2e
        working-directory: electron
        run: xvfb-run --auto-servernum npm run test:build

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: electron/playwright-report/
          if-no-files-found: ignore

# NOTE: packaging the desktop app (electron-builder + the uv Python sidecar) is a
# separate, tag-triggered release workflow — see electron/PACKAGING.md. It is not
# wired here because it needs per-OS signing secrets / vendored uv binaries.
