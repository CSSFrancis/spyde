name: Release

# Fires only when a version tag (e.g. v0.1.0) is pushed.
# Every platform builds in parallel; the Release is created only when all
# three pass so users never see a partial release.
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Build SpyDE on each platform ──────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true        # abort all legs if one fails — keeps releases clean
      matrix:
        include:
          - os: windows-latest
            artifact_name: SpyDE-windows
            # installer (primary) + portable (offline fallback)
            artifact_path: |
              dist/SpyDE-Setup-*.exe
              dist/SpyDE-portable-windows.zip

          - os: macos-latest
            artifact_name: SpyDE-macos
            artifact_path: dist/SpyDE.dmg

          - os: ubuntu-latest
            artifact_name: SpyDE-linux
            artifact_path: dist/SpyDE.AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip downloads to speed up repeat builds.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/AppData/Local/pip/Cache
          key: pip-${{ matrix.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ matrix.os }}-

      # Linux needs a display server for PySide6 imports during bundling.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 xvfb fuse libfuse2

      - name: Install spyde and all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[tests]"

      - name: Stamp build info
        run: python tools/write_build_info.py --channel stable

      - name: Install PyCrucible
        run: pip install pycrucible

      # ── Windows ───────────────────────────────────────────────────────────
      # tools/inject_icon.py safely injects the .ico by stripping the runner,
      # applying rcedit to only that portion, then re-assembling the exe so
      # PyCrucible's appended zip payload is never touched.
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          pycrucible --embed . --output dist/SpyDE.exe

      - name: Inject Windows icon
        if: runner.os == 'Windows'
        run: python tools/inject_icon.py dist/SpyDE.exe spyde/Spyde.ico

      - name: Package Windows portable artifact
        if: runner.os == 'Windows'
        run: |
          Copy-Item create_shortcut.ps1    dist\create_shortcut.ps1
          Compress-Archive `
            -Path dist\SpyDE.exe, dist\create_shortcut.ps1 `
            -DestinationPath dist\SpyDE-portable-windows.zip -Force

      # ── Windows uv-managed installer (NSIS) ───────────────────────────────
      - name: Install installer build deps (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install pyinstaller
          choco install nsis -y --no-progress

      - name: Stage installer payload (Windows)
        if: runner.os == 'Windows'
        run: python tools/build_installer_payload.py

      - name: Build NSIS installer (Windows)
        if: runner.os == 'Windows'
        run: |
          $v = python -c "import spyde._version as v; print(v.__version__)"
          & "$env:ProgramFiles (x86)\NSIS\makensis.exe" /DVERSION=$v installer\spyde.nsi
          if (-not (Test-Path "dist\SpyDE-Setup-$v.exe")) { exit 1 }

      # ── macOS: uv-managed .app → .dmg (icon.icns bundled) ─────────────────
      - name: Build macOS app + dmg
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          brew install create-dmg || true
          python tools/build_macos_app.py

      # ── Linux: uv-managed AppImage (Spyde.png icon + .desktop) ────────────
      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          sudo apt-get install -y --no-install-recommends rsync
          python tools/build_linux_appimage.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  # ── Publish a GitHub Release with all three artifacts ─────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build           # only runs when ALL build legs pass
    permissions:
      contents: write      # required to create/edit a Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifact directories
        run: |
          mkdir -p dist/release
          find dist -type f \( -name 'SpyDE-Setup-*.exe' -o \
            -name 'SpyDE-portable-windows.zip' -o -name 'SpyDE.dmg' -o \
            -name 'SpyDE.AppImage' \) -exec cp {} dist/release/ \;
          ls -la dist/release

      - name: Generate update manifest (latest.json)
        run: |
          python tools/write_manifest.py --channel stable \
            --out dist/release/latest.json \
            --notes-url "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" \
            --asset "windows-installer=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename dist/release/SpyDE-Setup-*.exe)" \
            --asset "windows-portable=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SpyDE-portable-windows.zip" \
            --asset "macos=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SpyDE.dmg" \
            --asset "linux=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SpyDE.AppImage"

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: SpyDE ${{ github.ref_name }}
          body: |
            ## SpyDE ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows  | `SpyDE-Setup-*.exe` | **Installer** (recommended) — per-user, no admin |
            | Windows  | `SpyDE-portable-windows.zip` | Portable / offline (no install) |
            | macOS    | `SpyDE.dmg` | |
            | Linux    | `SpyDE.AppImage` | |

            ### Installation
            **Windows:** run `SpyDE-Setup-*.exe`. First launch sets up the
            environment (incl. the GPU-correct PyTorch via uv) — give it a moment.
            Updates are checked automatically; install from Help → Check for Updates.

            **macOS:** open `SpyDE.dmg`, drag SpyDE to Applications.

            **Linux:** `chmod +x SpyDE.AppImage && ./SpyDE.AppImage`

            ### To trigger a new release
            ```bash
            git tag v0.1.0
            git push origin v0.1.0
            ```
          files: |
            dist/release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
