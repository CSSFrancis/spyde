name: Release

# The SECOND of the two release actions (the first is Prepare Release). Run it
# manually from the Actions tab AFTER the release PR has merged — no arguments,
# no hand-typed tag. It reads the version already in electron/package.json (which
# Prepare Release bumped), CREATES + pushes the matching `vX.Y.Z` tag, then builds
# the Electron desktop app (with the uv-managed Python sidecar — see
# electron/PACKAGING.md, DISTRIBUTION_PLAN.md "Option A") on each platform in
# parallel, publishing straight to a DRAFT GitHub Release so electron-builder
# generates the latest.yml/latest-mac.yml/latest-linux.yml feeds electron-
# updater's autoUpdater needs. The draft only goes live once all three legs
# succeed (`finalize`, gated on `needs: build`) so users never see a partial
# release.
#
# Why the workflow makes the tag itself (instead of a pushed tag triggering it):
# it collapses the release to TWO button-clicks (Prepare Release → Release) with
# nothing typed in a terminal, and it keeps everything in ONE run — so there is
# no cross-workflow trigger (a tag pushed by GITHUB_TOKEN can't start another
# workflow anyway). The tag still exists in history, so setuptools_scm derives
# the Python version from it exactly as before.
#
# Job order is load-bearing: the release must be CREATED once, sequentially,
# BEFORE the matrix — electron-builder's GitHub publisher finds-or-creates a
# release by tag, and 3 parallel matrix legs hitting that simultaneously is a
# known race (electron-builder#6676, duplicate drafts). `prepare-release`
# creates the draft up front so every matrix leg only ever *finds* it.
#
# Each installer stays small: it ships `uv` + the project source + uv.lock as
# extraResources; the venv (with the GPU-correct torch wheel) is built on the
# user's machine on first launch via `uv sync`. torch is NOT baked into the
# artifact.
on:
  workflow_dispatch: {}

permissions:
  contents: write   # create + push the tag; publish release assets

jobs:
  # ── Read the version from package.json, tag it, derive the channel ──────────
  # electron/package.json is the source of truth (Prepare Release bumped it). We
  # compute the tag = v<version>, CREATE + push it here, and derive the channel
  # from its shape: plain vX.Y.Z -> stable; any -rc.N / -beta.N / -alpha.N ->
  # beta (electron-updater's autoUpdater gates on GitHub's prerelease flag). All
  # downstream jobs consume `needs.channel.outputs.{tag,version,channel,prerelease}`
  # and check out `tag` (NOT github.ref, which is the branch under dispatch).
  channel:
    name: Tag + derive channel from package.json
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.detect.outputs.channel }}
      prerelease: ${{ steps.detect.outputs.prerelease }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version + derive tag/channel
        id: detect
        run: |
          version="$(node -p "require('./electron/package.json').version")"
          tag="v${version}"
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${tag} (from electron/package.json)."

      # Refuse to release a version that's already been tagged — otherwise this
      # would rebuild over an existing release. To ship a new build, bump via
      # Prepare Release first. (Idempotency guard, same spirit as prepare_release.)
      - name: Fail if the tag already exists
        env:
          TAG: ${{ steps.detect.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "::error::tag $TAG already exists — bump the version via Prepare Release before releasing."
            exit 1
          fi

      - name: Create and push the tag
        env:
          TAG: ${{ steps.detect.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Pushed $TAG."

  # ── Create the (draft) release BEFORE the matrix builds ─────────────────────
  # Sequential, single writer — sidesteps the concurrent-create race matrix
  # legs would hit if they each tried to find-or-create the release themselves.
  #
  # CRITICAL — the release MUST be a DRAFT when the builds publish into it.
  # electron-builder's GitHub publisher only uploads assets into an EXISTING
  # release when that release `.draft === true` (gitHubPublisher getOrCreateRelease:
  # `if (release.draft) return release`). If it finds a NON-draft release for the
  # tag, it skips every asset with "existing type not compatible with publishing
  # type" and — because that skip is non-fatal — the whole run goes GREEN with an
  # EMPTY release. That is exactly what silently shipped an asset-less
  # v0.2.0-rc.1: a non-draft prerelease had been created out-of-band ~30 min
  # before the workflow ran, so `prepare-release` merely FOUND it (non-draft) and
  # left it that way. So we do NOT set `prerelease:` here (a draft is type-neutral
  # for the upload path) and we FORCE the release back to draft if it already
  # exists. The prerelease flag is applied in `finalize`, AFTER assets attach.
  prepare-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: channel
    permissions:
      contents: write
    steps:
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SpyDE ${{ needs.channel.outputs.tag }}
          tag_name: ${{ needs.channel.outputs.tag }}
          draft: true
          body: |
            ## SpyDE ${{ needs.channel.outputs.tag }}

            Desktop app (Electron) with a uv-managed Python backend. The
            installer is small — the analysis environment (incl. the GPU-correct
            PyTorch wheel) is set up on **first launch**, which needs a network
            connection and may take a few minutes. Later launches are instant.

            > ⚠️ Unsigned for now: Windows SmartScreen / macOS Gatekeeper will
            > warn on first run. On Windows choose "More info → Run anyway"; on
            > macOS right-click the app → Open.

            ${{ needs.channel.outputs.channel == 'beta' && '**Beta channel** — only offered to users who opted into beta updates.' || '' }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `SpyDE Setup *.exe` (NSIS installer) |
            | macOS    | `SpyDE-*.dmg` |
            | Linux    | `SpyDE-*.AppImage` |
          generate_release_notes: true

      # softprops/action-gh-release only CREATES a draft; if a release for this
      # tag already exists (e.g. one made out-of-band, which is what stranded
      # v0.2.0-rc.1) it just updates it and leaves its draft flag untouched. The
      # builds can only upload into a DRAFT, so force it here — idempotent, and
      # the single point that guarantees the invariant the whole publish path
      # depends on. Also strip any assets a prior half-run left attached, so the
      # "release has assets" check in each build leg reflects THIS run only.
      - name: Force the release to draft (and clear stale assets)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.channel.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          gh release edit "$TAG" --repo "$REPO" --draft=true
          # Delete any assets already attached (from an earlier failed attempt),
          # so a build leg can trust that assets it doesn't upload are its own gap.
          assets=$(gh release view "$TAG" --repo "$REPO" \
                     --json assets --jq '.assets[].name' 2>/dev/null || true)
          for a in $assets; do
            echo "Removing stale asset: $a"
            gh release delete-asset "$TAG" "$a" --repo "$REPO" --yes || true
          done

  # ── Build the Electron app + staged Python sidecar on each platform ─────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [channel, prepare-release]
    permissions:
      contents: write      # electron-builder publishes assets to the release
    # windows-latest's default step shell is PowerShell, which killed two
    # v0.1.0 attempts (ParserError on the bash version-guard script; then
    # npm.cmd arg-mangling that turned -c.publish.repo=spyde into a config
    # FILE path → ENOENT). Every run step in this job is a POSIX script or a
    # command verified under Git Bash on Windows, so default the whole job.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: true        # abort all legs if one fails — keeps releases clean
      matrix:
        include:
          - os: windows-latest
            # electron-builder (nsis) emits "SpyDE Setup <version>.exe".
            artifact_glob: electron/dist/*.exe
          - os: macos-latest
            artifact_glob: electron/dist/*.dmg
          - os: ubuntu-latest
            artifact_glob: electron/dist/*.AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Check out the TAG the channel job just created (under workflow_dispatch
        # github.ref is `main`, not the tag). Full history + tags so
        # setuptools_scm derives the real version from it (a shallow checkout has
        # no tags -> 0.0.postN.devN).
        with:
          ref: ${{ needs.channel.outputs.tag }}
          fetch-depth: 0

      # The tag was derived FROM electron/package.json, but this build leg checks
      # out the TAG ref — so re-assert they agree on the tagged commit. Guards
      # against main moving between the channel job reading package.json and this
      # checkout, which would otherwise ship an installer whose embedded semver
      # (what electron-updater reasons about) doesn't match the release tag.
      - name: Verify electron/package.json version matches the tag
        run: |
          pkg_version=$(node -p "require('./electron/package.json').version")
          tag_version="${{ needs.channel.outputs.version }}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::electron/package.json version ($pkg_version) does not match tag v$tag_version"
            exit 1
          fi

      # ── Node (Electron frontend + electron-builder) ──────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── uv (vendored into the installer as the Python sidecar bootstrapper) ──
      # bundle-python.mjs copies the `uv` on PATH into the payload when
      # electron/vendor/uv/<platform>/ is absent, so installing uv here is what
      # populates the shipped binary.
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Fail fast on a drifted lock: the installer bundles pyproject.toml +
      # uv.lock and resolves the venv on the USER's first launch, so an
      # out-of-sync lock would ship a broken installer that only fails for them.
      - name: Verify uv.lock is in sync with pyproject.toml
        run: uv lock --check

      # AppImage tooling needs FUSE on the runner.
      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends fuse libfuse2

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      # Build renderer/main → stage the Python sidecar payload → electron-builder
      # --publish always. electron-builder finds the draft `prepare-release`
      # already created (by tag) and uploads this platform's installer PLUS the
      # update-feed metadata (latest.yml / latest-mac.yml / latest-linux.yml)
      # electron-updater's autoUpdater reads at runtime — publish:false builds
      # never generate these files at all. Unsigned for now — signing secrets
      # are a follow-up (PACKAGING.md "What's intentionally deferred").
      # -c.publish.owner/.repo pin the publish target to THE REPO THIS WORKFLOW
      # RUNS IN — the same-repo assumption the draft-release design above already
      # makes (GITHUB_TOKEN can't publish cross-repo anyway). Without the
      # override, electron-builder.yml's static owner decides, and a value that
      # doesn't match this repo 404s the whole build (v0.1.0 died publishing to
      # the not-yet-existing directelectron org). Survives a future repo
      # transfer with zero edits.
      # electron-builder's "skipped publishing" is a NON-FATAL warning: if it
      # can't upload into the release (e.g. the release isn't a draft) it logs
      # the skip and exits 0, so the build looks green while attaching ZERO
      # assets. `prepare-release` now guarantees a draft, but that guarantee is
      # only worth anything if a regression that breaks it FAILS loudly — so tee
      # the output and hard-fail on any "skipped publishing" / "release not
      # created" line. This is the tripwire that would have caught the empty
      # v0.2.0-rc.1 release at build time instead of after users noticed.
      - name: Build + publish desktop app
        working-directory: electron
        run: |
          set -o pipefail
          npm run dist -- --publish always \
            -c.publish.owner=${{ github.repository_owner }} \
            -c.publish.repo=${{ github.event.repository.name }} 2>&1 | tee eb-publish.log
          if grep -qiE "skipped publishing|GitHub release not created" eb-publish.log; then
            echo "::error::electron-builder SKIPPED publishing assets — the release is not a writable draft. See the 'skipped publishing' / 'release not created' lines above."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact (for release-notes / manual inspection)
        uses: actions/upload-artifact@v4
        with:
          name: spyde-${{ runner.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  # ── Un-draft the release now that all three legs have published ─────────────
  finalize:
    name: Publish (un-draft) the release
    runs-on: ubuntu-latest
    needs: [channel, build]   # only runs when ALL build legs pass
    permissions:
      contents: write

    steps:
      # Last line of defence: all three legs went green, but confirm assets
      # ACTUALLY landed before we publish. A release with no installers is worse
      # than a failed run (it looks shippable), so refuse to un-draft an empty
      # one. Expect the 3 installers + their .blockmap + the latest*.yml feeds.
      - name: Verify the release has assets before publishing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.channel.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          count=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets | length')
          echo "Release $TAG has $count asset(s)."
          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name'
          if [ "$count" -lt 3 ]; then
            echo "::error::Release $TAG has only $count assets — the installers did not attach. Refusing to publish an empty release."
            exit 1
          fi

      # Un-draft AND stamp the channel: the prerelease flag is applied HERE (not
      # at draft-creation) so the release stays a plain draft during the upload
      # phase — see the prepare-release note on why a non-draft release makes
      # electron-builder skip every asset.
      - name: Publish the release (un-draft + set channel)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.channel.outputs.tag }}
          REPO: ${{ github.repository }}
          PRERELEASE: ${{ needs.channel.outputs.prerelease }}
        run: |
          gh release edit "$TAG" --repo "$REPO" \
            --draft=false --prerelease="$PRERELEASE"
