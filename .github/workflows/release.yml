name: Release

# Fires only when a version tag (e.g. v0.1.0) is pushed.
# Every platform builds in parallel; the Release is created only when all
# three pass so users never see a partial release.
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Build SpyDE on each platform ──────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true        # abort all legs if one fails — keeps releases clean
      matrix:
        include:
          - os: windows-latest
            artifact_name: SpyDE-windows.zip
            artifact_path: dist/SpyDE-windows.zip

          - os: macos-latest
            artifact_name: SpyDE.dmg
            artifact_path: dist/SpyDE.dmg

          - os: ubuntu-latest
            artifact_name: SpyDE.AppImage
            artifact_path: dist/SpyDE.AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip downloads to speed up repeat builds.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/AppData/Local/pip/Cache
          key: pip-${{ matrix.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ matrix.os }}-

      # Linux needs a display server for PySide6 imports during bundling.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 xvfb fuse libfuse2

      - name: Install spyde and all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[tests]"

      - name: Install PyCrucible
        run: pip install pycrucible

      # ── Windows ───────────────────────────────────────────────────────────
      # tools/inject_icon.py safely injects the .ico by stripping the runner,
      # applying rcedit to only that portion, then re-assembling the exe so
      # PyCrucible's appended zip payload is never touched.
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          pycrucible --embed . --output dist/SpyDE.exe

      - name: Inject Windows icon
        if: runner.os == 'Windows'
        run: python tools/inject_icon.py dist/SpyDE.exe spyde/Spyde.ico

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        run: |
          Copy-Item create_shortcut.ps1    dist\create_shortcut.ps1
          Compress-Archive `
            -Path dist\SpyDE.exe, dist\create_shortcut.ps1 `
            -DestinationPath dist\SpyDE-windows.zip -Force

      # ── macOS ─────────────────────────────────────────────────────────────
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          pycrucible --embed . --output dist/SpyDE

      - name: Package macOS .app → .dmg
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "SpyDE" \
            --volicon "spyde/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "SpyDE" 175 190 \
            --app-drop-link 425 190 \
            "dist/SpyDE.dmg" \
            "dist/SpyDE" || \
          hdiutil create -volname SpyDE -srcfolder dist/SpyDE \
            -ov -format UDZO dist/SpyDE.dmg

      # ── Linux ─────────────────────────────────────────────────────────────
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          pycrucible --embed . --output dist/SpyDE.AppImage

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  # ── Publish a GitHub Release with all three artifacts ─────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build           # only runs when ALL build legs pass
    permissions:
      contents: write      # required to create/edit a Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: SpyDE ${{ github.ref_name }}
          body: |
            ## SpyDE ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `SpyDE-windows.zip` |
            | macOS    | `SpyDE.dmg` |
            | Linux    | `SpyDE.AppImage` |

            ### Installation
            **Windows:**
            1. Extract `SpyDE-windows.zip`
            2. Run `create_shortcut.ps1` once to create a branded desktop/Start-Menu shortcut
            3. Launch via the shortcut (or run `SpyDE.exe` directly)

            **macOS:** Open `SpyDE.dmg`, drag SpyDE to Applications.

            **Linux:** `chmod +x SpyDE.AppImage && ./SpyDE.AppImage`

            ### To trigger a new release
            ```bash
            git tag v0.1.0
            git push origin v0.1.0
            ```
          files: |
            dist/SpyDE-windows.zip/SpyDE-windows.zip
            dist/SpyDE.dmg/SpyDE.dmg
            dist/SpyDE.AppImage/SpyDE.AppImage
          fail_on_unmatched_files: true
          generate_release_notes: true
