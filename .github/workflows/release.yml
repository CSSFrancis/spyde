name: Release

# Fires only when a version tag (e.g. v0.1.0) is pushed.
# Builds the Electron desktop app (with the uv-managed Python sidecar — see
# electron/PACKAGING.md, DISTRIBUTION_PLAN.md "Option A") on each platform in
# parallel, publishing straight to a DRAFT GitHub Release so electron-builder
# generates the latest.yml/latest-mac.yml/latest-linux.yml feeds electron-
# updater's autoUpdater needs. The draft only goes live once all three legs
# succeed (`finalize`, gated on `needs: build`) so users never see a partial
# release — same "fail-fast, all-or-nothing" guarantee as before, just with
# real update-feed metadata attached this time.
#
# Job order is load-bearing: the release must be CREATED once, sequentially,
# BEFORE the matrix — electron-builder's GitHub publisher finds-or-creates a
# release by tag, and 3 parallel matrix legs hitting that simultaneously is a
# known race (electron-builder#6676, duplicate drafts). `prepare-release`
# creates the draft up front so every matrix leg only ever *finds* it.
#
# Each installer stays small: it ships `uv` + the project source + uv.lock as
# extraResources; the venv (with the GPU-correct torch wheel) is built on the
# user's machine on first launch via `uv sync`. torch is NOT baked into the
# artifact.
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Derive the update channel from the tag shape (stable vs beta) ───────────
  # Plain vX.Y.Z -> stable. Any prerelease suffix (-rc.N / -beta.N / -alpha.N)
  # -> beta. electron-updater's autoUpdater understands GitHub's own
  # "prerelease" flag natively (allowPrerelease gates on it), so this one
  # regex is what the whole channel feature hinges on downstream.
  channel:
    name: Derive channel from tag
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.detect.outputs.channel }}
      prerelease: ${{ steps.detect.outputs.prerelease }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Detect channel + version from tag
        id: detect
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  # ── Create the (draft) release BEFORE the matrix builds ─────────────────────
  # Sequential, single writer — sidesteps the concurrent-create race matrix
  # legs would hit if they each tried to find-or-create the release themselves.
  #
  # CRITICAL — the release MUST be a DRAFT when the builds publish into it.
  # electron-builder's GitHub publisher only uploads assets into an EXISTING
  # release when that release `.draft === true` (gitHubPublisher getOrCreateRelease:
  # `if (release.draft) return release`). If it finds a NON-draft release for the
  # tag, it skips every asset with "existing type not compatible with publishing
  # type" and — because that skip is non-fatal — the whole run goes GREEN with an
  # EMPTY release. That is exactly what silently shipped an asset-less
  # v0.2.0-rc.1: a non-draft prerelease had been created out-of-band ~30 min
  # before the workflow ran, so `prepare-release` merely FOUND it (non-draft) and
  # left it that way. So we do NOT set `prerelease:` here (a draft is type-neutral
  # for the upload path) and we FORCE the release back to draft if it already
  # exists. The prerelease flag is applied in `finalize`, AFTER assets attach.
  prepare-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: channel
    permissions:
      contents: write
    steps:
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SpyDE ${{ github.ref_name }}
          draft: true
          body: |
            ## SpyDE ${{ github.ref_name }}

            Desktop app (Electron) with a uv-managed Python backend. The
            installer is small — the analysis environment (incl. the GPU-correct
            PyTorch wheel) is set up on **first launch**, which needs a network
            connection and may take a few minutes. Later launches are instant.

            > ⚠️ Unsigned for now: Windows SmartScreen / macOS Gatekeeper will
            > warn on first run. On Windows choose "More info → Run anyway"; on
            > macOS right-click the app → Open.

            ${{ needs.channel.outputs.channel == 'beta' && '**Beta channel** — only offered to users who opted into beta updates.' || '' }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `SpyDE Setup *.exe` (NSIS installer) |
            | macOS    | `SpyDE-*.dmg` |
            | Linux    | `SpyDE-*.AppImage` |
          generate_release_notes: true

      # softprops/action-gh-release only CREATES a draft; if a release for this
      # tag already exists (e.g. one made out-of-band, which is what stranded
      # v0.2.0-rc.1) it just updates it and leaves its draft flag untouched. The
      # builds can only upload into a DRAFT, so force it here — idempotent, and
      # the single point that guarantees the invariant the whole publish path
      # depends on. Also strip any assets a prior half-run left attached, so the
      # "release has assets" check in each build leg reflects THIS run only.
      - name: Force the release to draft (and clear stale assets)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release edit "$TAG" --repo "$REPO" --draft=true
          # Delete any assets already attached (from an earlier failed attempt),
          # so a build leg can trust that assets it doesn't upload are its own gap.
          assets=$(gh release view "$TAG" --repo "$REPO" \
                     --json assets --jq '.assets[].name' 2>/dev/null || true)
          for a in $assets; do
            echo "Removing stale asset: $a"
            gh release delete-asset "$TAG" "$a" --repo "$REPO" --yes || true
          done

  # ── Build the Electron app + staged Python sidecar on each platform ─────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [channel, prepare-release]
    permissions:
      contents: write      # electron-builder publishes assets to the release
    # The `secrets` context is NOT available in step-level `if:` — only `env` is.
    # So surface "is the mac cert configured?" as a job-level env flag the signing
    # steps can gate on (a fork / secret-less run then produces an unsigned build).
    env:
      MAC_SIGNING_ENABLED: ${{ secrets.MAC_CERT_P12_BASE64 != '' && 'true' || 'false' }}
    # windows-latest's default step shell is PowerShell, which killed two
    # v0.1.0 attempts (ParserError on the bash version-guard script; then
    # npm.cmd arg-mangling that turned -c.publish.repo=spyde into a config
    # FILE path → ENOENT). Every run step in this job is a POSIX script or a
    # command verified under Git Bash on Windows, so default the whole job.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: true        # abort all legs if one fails — keeps releases clean
      matrix:
        include:
          - os: windows-latest
            # electron-builder (nsis) emits "SpyDE Setup <version>.exe".
            artifact_glob: electron/dist/*.exe
          - os: macos-latest
            # dmg = manual install; zip = the electron-updater auto-update payload
            # (macOS can't auto-update from a dmg). Both are published to the release.
            artifact_glob: |
              electron/dist/*.dmg
              electron/dist/*.zip
          - os: ubuntu-latest
            artifact_glob: electron/dist/*.AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Full history + tags so setuptools_scm derives the real version from the
        # pushed v* tag (a shallow checkout has no tags -> 0.0.postN.devN).
        with:
          fetch-depth: 0

      # electron/package.json's "version" is hand-set (RELEASING.md) — it's
      # what electron-builder/electron-updater treat as the app's semver, so a
      # drift here would ship an installer electron-updater can't reason about
      # correctly (or a release that silently doesn't offer itself as an
      # update). Fail fast rather than publish a mismatched build.
      - name: Verify electron/package.json version matches the pushed tag
        run: |
          pkg_version=$(node -p "require('./electron/package.json').version")
          tag_version="${{ needs.channel.outputs.version }}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::electron/package.json version ($pkg_version) does not match tag v$tag_version"
            exit 1
          fi

      # ── Node (Electron frontend + electron-builder) ──────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # ── uv (vendored into the installer as the Python sidecar bootstrapper) ──
      # bundle-python.mjs copies the `uv` on PATH into the payload when
      # electron/vendor/uv/<platform>/ is absent, so installing uv here is what
      # populates the shipped binary.
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          # Pinned: resolving "latest" hits the GitHub releases API, which
          # took out every CI leg during the 2026-07 API outage.
          version: "0.10.11"
          enable-cache: true

      # Fail fast on a drifted lock: the installer bundles pyproject.toml +
      # uv.lock and resolves the venv on the USER's first launch, so an
      # out-of-sync lock would ship a broken installer that only fails for them.
      - name: Verify uv.lock is in sync with pyproject.toml
        run: uv lock --check

      # AppImage tooling needs FUSE on the runner.
      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends fuse libfuse2

      # ── Vendor a portable git into the payload (Windows only) ────────────────
      # `uv sync` resolves the git+https hyperspy fork by shelling out to `git`,
      # and a clean Windows user machine often has NO git → first-launch setup
      # fails ("Git operation failed"). bundle-python.mjs stages
      # electron/vendor/git/win32/ into the installer; this step populates it with
      # the official MinGit. macOS/Linux ship git, so they need no vendored copy.
      - name: Vendor MinGit (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          MINGIT_VER: "2.51.0"
          MINGIT_TAG: "v2.51.0.windows.1"
        run: |
          dest="electron/vendor/git/win32"
          mkdir -p "$dest"
          url="https://github.com/git-for-windows/git/releases/download/${MINGIT_TAG}/MinGit-${MINGIT_VER}-64-bit.zip"
          echo "Downloading $url"
          curl -fsSL -o mingit.zip "$url"
          unzip -q mingit.zip -d "$dest"
          # Sanity: the launcher must exist where pythonEnv.ts adds it to PATH.
          test -f "$dest/cmd/git.exe" || test -f "$dest/bin/git.exe"
          "$dest/cmd/git.exe" --version || "$dest/bin/git.exe" --version

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      # ── macOS code signing (only when secrets are present) ─────────────────────
      # Import the Developer ID Application cert into a throwaway keychain so
      # electron-builder can sign + (with notarize:true) notarize. See SIGNING.md.
      # Gated on both runner.os == macOS AND the cert secret being set, so a fork
      # / secret-less run skips it and electron-builder produces an unsigned build
      # (rather than failing) — matching electron-builder.yml's no-identity-null.
      - name: Import Apple signing certificate (macOS only)
        if: runner.os == 'macOS' && env.MAC_SIGNING_ENABLED == 'true'
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(openssl rand -base64 24)
          echo "$MAC_CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Ensure the Developer ID G2 intermediate is present so codesign can build
          # the chain even if the .p12 didn't bundle it.
          curl -fsSO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import DeveloperIDG2CA.cer -k "$KEYCHAIN" || true
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm -f cert.p12 DeveloperIDG2CA.cer
          # Sanity: the signing identity is now findable.
          security find-identity -v -p codesigning "$KEYCHAIN"

      # Write the App Store Connect API key to a file; electron-builder's notarize
      # step wants APPLE_API_KEY as a PATH to the .p8.
      - name: Stage notarization API key (macOS only)
        if: runner.os == 'macOS' && env.MAC_SIGNING_ENABLED == 'true'
        run: |
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "$RUNNER_TEMP/apple_api_key.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/apple_api_key.p8" >> "$GITHUB_ENV"

      # Build renderer/main → stage the Python sidecar payload → electron-builder
      # --publish always. electron-builder finds the draft `prepare-release`
      # already created (by tag) and uploads this platform's installer PLUS the
      # update-feed metadata (latest.yml / latest-mac.yml / latest-linux.yml)
      # electron-updater's autoUpdater reads at runtime — publish:false builds
      # never generate these files at all. On macOS the app is signed + notarized
      # when MAC_SIGNING_ENABLED (see the signing steps above + SIGNING.md).
      # -c.publish.owner/.repo pin the publish target to THE REPO THIS WORKFLOW
      # RUNS IN — the same-repo assumption the draft-release design above already
      # makes (GITHUB_TOKEN can't publish cross-repo anyway). Without the
      # override, electron-builder.yml's static owner decides, and a value that
      # doesn't match this repo 404s the whole build (v0.1.0 died publishing to
      # the not-yet-existing directelectron org). Survives a future repo
      # transfer with zero edits.
      # electron-builder's "skipped publishing" is a NON-FATAL warning: if it
      # can't upload into the release (e.g. the release isn't a draft) it logs
      # the skip and exits 0, so the build looks green while attaching ZERO
      # assets. `prepare-release` now guarantees a draft, but that guarantee is
      # only worth anything if a regression that breaks it FAILS loudly — so tee
      # the output and hard-fail on any "skipped publishing" / "release not
      # created" line. This is the tripwire that would have caught the empty
      # v0.2.0-rc.1 release at build time instead of after users noticed.
      - name: Build + publish desktop app
        working-directory: electron
        run: |
          set -o pipefail
          npm run dist -- --publish always \
            -c.publish.owner=${{ github.repository_owner }} \
            -c.publish.repo=${{ github.event.repository.name }} 2>&1 | tee eb-publish.log
          if grep -qiE "skipped publishing|GitHub release not created" eb-publish.log; then
            echo "::error::electron-builder SKIPPED publishing assets — the release is not a writable draft. See the 'skipped publishing' / 'release not created' lines above."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS notarization (electron-builder's notarize:true reads these). Empty
          # on non-mac legs / secret-less runs → notarization is simply skipped there.
          # APPLE_API_KEY is a PATH, set by the "Stage notarization API key" step.
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload build artifact (for release-notes / manual inspection)
        uses: actions/upload-artifact@v4
        with:
          name: spyde-${{ runner.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  # ── Un-draft the release now that all three legs have published ─────────────
  finalize:
    name: Publish (un-draft) the release
    runs-on: ubuntu-latest
    needs: [channel, build]   # only runs when ALL build legs pass
    permissions:
      contents: write

    steps:
      # Last line of defence: all three legs went green, but confirm assets
      # ACTUALLY landed before we publish. A release with no installers is worse
      # than a failed run (it looks shippable), so refuse to un-draft an empty
      # one. Expect the 3 installers + their .blockmap + the latest*.yml feeds.
      - name: Verify the release has assets before publishing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          count=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets | length')
          echo "Release $TAG has $count asset(s)."
          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name'
          if [ "$count" -lt 3 ]; then
            echo "::error::Release $TAG has only $count assets — the installers did not attach. Refusing to publish an empty release."
            exit 1
          fi

      # AUTO-UPDATE FEED GATE — the check that would have caught "mac auto-update
      # failed spectacularly". electron-updater reads latest*.yml to decide what to
      # download; on macOS it CANNOT apply a .dmg, only a .zip. A dmg-only mac feed
      # builds + publishes fine (so the asset-count gate above passes) yet every
      # mac auto-update then fails. Validate each platform feed references an
      # INSTALLABLE payload AND that the referenced file is actually an attached
      # asset — refuse to publish a release users can't update from.
      - name: Validate the auto-update feeds are installable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # asset names actually attached to the release
          mapfile -t ASSETS < <(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          has_asset() { for a in "${ASSETS[@]}"; do [ "$a" = "$1" ] && return 0; done; return 1; }

          # feed file -> the extension(s) electron-updater can install from it
          declare -A FEED_EXT=(
            [latest-mac.yml]='\.zip$'
            [latest.yml]='\.(exe|nupkg)$'
            [latest-linux.yml]='\.(AppImage|deb|rpm)$'
          )
          # This step runs while the release is STILL A DRAFT (finalize un-drafts it
          # AFTER this passes). Draft assets are NOT reachable at the public
          # releases/download/<tag>/ URL (404), so fetch them through the API with
          # `gh release download`, which authenticates and sees the draft.
          tmp=$(mktemp -d)
          fail=0
          for feed in latest-mac.yml latest.yml latest-linux.yml; do
            if ! has_asset "$feed"; then
              echo "::error::update feed $feed is not attached to the release — electron-updater can't detect updates on that platform."
              fail=1; continue
            fi
            if ! gh release download "$TAG" --repo "$REPO" --pattern "$feed" --dir "$tmp" --clobber; then
              echo "::error::could not download update feed $feed from the (draft) release."
              fail=1; continue
            fi
            body=$(cat "$tmp/$feed")
            # every `url:` entry under files: (the installable payloads)
            mapfile -t urls < <(printf '%s\n' "$body" | sed -nE 's/^[[:space:]]*-?[[:space:]]*url:[[:space:]]*//p')
            if [ "${#urls[@]}" -eq 0 ]; then
              echo "::error::$feed lists no files — malformed update feed."; fail=1; continue
            fi
            want="${FEED_EXT[$feed]}"
            ok=0
            for u in "${urls[@]}"; do
              u="${u%$'\r'}"                       # strip any CRLF
              if printf '%s' "$u" | grep -qiE "$want"; then
                if has_asset "$u"; then ok=1; echo "  $feed -> $u ✓"; else
                  echo "::error::$feed references '$u' but it is NOT an attached asset."; fail=1
                fi
              fi
            done
            if [ "$ok" -eq 0 ]; then
              echo "::error::$feed has no installable payload (need $want). Files: ${urls[*]}. On macOS a dmg-only feed CANNOT auto-update — add the zip target."
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || { echo "::error::auto-update feed validation failed — refusing to publish a release users can't update from."; exit 1; }
          echo "All auto-update feeds reference an installable, attached payload."

      # Un-draft AND stamp the channel: the prerelease flag is applied HERE (not
      # at draft-creation) so the release stays a plain draft during the upload
      # phase — see the prepare-release note on why a non-draft release makes
      # electron-builder skip every asset.
      - name: Publish the release (un-draft + set channel)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          PRERELEASE: ${{ needs.channel.outputs.prerelease }}
        run: |
          gh release edit "$TAG" --repo "$REPO" \
            --draft=false --prerelease="$PRERELEASE"
