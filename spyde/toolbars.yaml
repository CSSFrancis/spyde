functions:
  Reset:
    description: Resets the data to its original view.
    icon: drawing/toolbars/icons/fullsize.svg
    function: spyde.actions.base.reset_view
    plot_dim: [1, 2]
    toolbar_side: right
  Zoom In:
    description: Zooms into the data view.
    icon: drawing/toolbars/icons/zoom.svg
    function: spyde.actions.base.zoom_in
    plot_dim: [ 1, 2 ]
    toolbar_side: right
  Zoom Out:
    description: Zooms out of the data view.
    icon: drawing/toolbars/icons/zoomout.svg
    function: spyde.actions.base.zoom_out
    plot_dim: [ 1, 2 ]
    toolbar_side: right
  Add Selector:
    description: Adds a selection tool to the data view.
    icon: drawing/toolbars/icons/add_selector.svg
    function: spyde.actions.base.add_selector
    plot_dim: [ 1, 2 ]
    navigation: True
    toolbar_side: right
  Play:
    description: Play the movie in real time — 1 s of playback = 1 s of experiment time (from the time-axis scale). Loops; toggle to pause.
    icon: drawing/toolbars/icons/play.svg
    function: spyde.actions.base.play_pause
    plot_dim: [ 1 ]
    navigation: True
    signal_types: [insitu]
    toggle: True
    toolbar_side: right
  Fast Forward:
    description: Fast-forward — cycle the playback speed 2x → 4x → 8x → 1x. Starts playback if stopped.
    icon: drawing/toolbars/icons/fastforward.svg
    function: spyde.actions.base.fast_forward
    plot_dim: [ 1 ]
    navigation: True
    signal_types: [insitu]
    toggle: True
    toolbar_side: right
  Export Movie:
    description: Export the in-situ movie to a video (H.264 mp4 / GIF) — colormapped frames with a burnt-in timestamp, scale bar, time-gated annotations, and optional 1-D trace insets.
    icon: drawing/toolbars/icons/play.svg
    function: spyde.actions.movie_export.handlers.export_movie_action
    signal_types: [insitu]
    plot_dim: [2]
    navigation: False
    toolbar_side: bottom
    toggle: True
  FFT:
    description: Applies Fast Fourier Transform to the data based on the current selected area.
    icon: drawing/toolbars/icons/fft.svg
    function: spyde.actions.fft_action.FFTAction
    plot_dim: [ 2 ]
    toolbar_side: right
  Rebin:
    description: Rebin the signal data to reduce its size.
    icon: drawing/toolbars/icons/rebin.svg
    parameters:
      scale_x:
        name: Scale X
        type: int
        default: 2
      scale_y:
        name: Scale Y
        type: int
        default: 2
    function: spyde.actions.base.Rebin2DAction
    plot_dim: [ 2 ]
    toolbar_side: bottom
    navigation: False
    toggle: True
  Crop:
    description: Crop the dataset to a spatial (image) box and optional time range. Produces a smaller lazy dataset (no data copied). Leave a range at 0 to keep that axis whole.
    icon: drawing/toolbars/icons/crop.svg
    function: spyde.actions.base.CropAction
    plot_dim: [ 2 ]
    toolbar_side: bottom
    navigation: False
    parameters:
      x0:
        name: X start
        type: int
        default: 0
      x1:
        name: X end
        type: int
        default: 0
      y0:
        name: Y start
        type: int
        default: 0
      y1:
        name: Y end
        type: int
        default: 0
      t0:
        name: T start
        type: int
        default: 0
      t1:
        name: T end
        type: int
        default: 0
  Center Zero Beam:
    description: Centers the zero beam in diffraction patterns (Automatic / Manual).
    icon: drawing/toolbars/icons/center_zero_beam.svg
    function: spyde.actions.center_zero_beam.center_zero_beam
    signal_class: pyxem.signals.Diffraction2D
    exclude_signal_types: [spyde_diffraction_vectors_image]
    plot_dim: [ 2 ]
    toolbar_side: bottom
    navigation: False
    toggle: True
  Virtual Imaging:
    description: Creates virtual images from the 4D-STEM data. Add multiple with +.
    icon: drawing/toolbars/icons/virtual_image_color.svg
    function: spyde.actions.virtual_image.virtual_imaging
    signal_class: pyxem.signals.Diffraction2D
    exclude_signal_types: [spyde_diffraction_vectors_image]
    plot_dim: [ 2]
    toolbar_side: bottom
    navigation: False
    submenu: True
    subfunctions:
      add_virtual_image:
        name: Add Virtual Image
        description: Add a virtual image with a colour-cycled detector ROI.
        icon: drawing/toolbars/icons/virtual_imaging.svg
        function: spyde.actions.virtual_image.add_virtual_image
        parameters:
          type:
            name: Detector Type
            type: enum
            default: disk
            options: [annular, disk, rectangle]
          calculation:
            name: Calculation
            type: enum
            default: mean
            options: [mean, sum]
  Copy to Report:
    description: Snapshot this image into the Report as a figure cell (opens a report if none is active).
    icon: drawing/toolbars/icons/signal_tree.svg
    function: spyde.actions.report.toolbar_actions.copy_to_report
    plot_dim: [2]
    toolbar_side: right
  Line Profile:
    description: Extract a 1D line profile from the current 2D plot.
    icon: drawing/toolbars/icons/line_profile.svg
    function: spyde.actions.line_profile_action.LineProfileAction
    plot_dim: [2]
    toolbar_side: bottom
  Orientation Mapping:
    description: Run template matching orientation mapping on a 4D-STEM dataset.
    icon: drawing/toolbars/icons/orientation_mapping.svg
    function: spyde.actions.orientation_action.orientation_mapping
    signal_class: pyxem.signals.Diffraction2D
    exclude_signal_types: [spyde_diffraction_vectors_image]
    plot_dim: [2]
    toolbar_side: bottom
    navigation: False
    parameters:
      cif_path:
        name: Crystal (.cif)
        type: file
        extensions: [.cif]
        default: ""
        tab: Load
      accelerating_voltage:
        name: Voltage (kV)
        type: float
        default: 200.0
        tab: Load
      resolution:
        name: Angle res (°)
        type: float
        default: 1.0
        min: 0.1
        max: 10.0
        step: 0.1
        tab: Library
      minimum_intensity:
        name: Min intensity
        type: float
        default: 0.0001
        min: 0.0
        max: 0.05
        step: 0.0005
        tab: Library
      gamma:
        name: Gamma
        type: float
        default: 0.5
        min: 0.1
        max: 1.5
        step: 0.05
        tab: Refine
      normalize_templates:
        name: Normalize templates
        type: bool
        default: False
        tab: Refine
      n_best:
        name: N Best
        type: int
        default: 5
        min: 1
        max: 20
        tab: Run
  Find Diffraction Vectors:
    description: Find diffraction vectors via the neural (SpotUNet) disk detector, window-normalized cross-correlation (flat disk) or a Difference-of-Gaussians band-pass (small spots / beam-stopped data).
    icon: drawing/toolbars/icons/peak_finding.svg
    function: spyde.actions.find_vectors_action.find_diffraction_vectors
    signal_class: pyxem.signals.Diffraction2D
    exclude_signal_types: [spyde_diffraction_vectors_image]
    plot_dim: [2]
    toolbar_side: bottom
    navigation: False
    parameters:
      method:
        name: Method
        type: enum
        default: neural
        choices: [neural, nxcorr, dog]
      sigma:
        name: Nav Blur σ
        type: float
        # Nav blur defaults OFF (2026-07-16); never applied at all for the
        # neural method (_coerce forces 0).
        default: 0.0
        min: 0.0
        max: 5.0
        step: 0.1
      kernel_radius:
        name: Disk Radius
        type: int
        default: 5
        min: 1
        max: 30
      dog_sigma1:
        name: DoG σ₁ (spot)
        type: float
        default: 0.8
        min: 0.4
        max: 3.0
        step: 0.1
      dog_sigma2:
        name: DoG σ₂ (bg)
        type: float
        default: 2.0
        min: 1.0
        max: 6.0
        step: 0.1
      threshold:
        name: Threshold
        type: float
        default: 0.3
        min: 0.0
        max: 30.0
        step: 0.05
      min_distance:
        name: Min Distance
        type: int
        default: 5
        min: 1
        max: 30
      beamstop_auto:
        name: Mask beam stop
        type: bool
        default: False
      show_transform:
        name: Show transform
        type: bool
        default: False
      subpixel:
        name: Subpixel
        type: bool
        default: True
  Vector Virtual Imaging:
    description: Build virtual images from diffraction vectors (intensity-weighted, kernel-radius disks). Add multiple with +.
    icon: drawing/toolbars/icons/virtual_image_color.svg
    function: spyde.actions.vector_virtual_imaging.vector_virtual_imaging
    signal_types: [spyde_diffraction_vectors_image]
    requires_vectors: True
    plot_dim: [2]
    toolbar_side: bottom
    navigation: False
    toggle: True
    submenu: True
    subfunctions:
      add_vector_virtual_image:
        name: Add Vector Virtual Image
        description: Add a vector virtual image with a circular ROI.
        icon: drawing/toolbars/icons/virtual_imaging.svg
        function: spyde.actions.vector_virtual_imaging.add_vector_virtual_image
        parameters:
          type:
            name: Detector shape
            type: enum
            default: disk
            options: [disk, annular, rectangle]
          calculation:
            name: Weighting
            type: enum
            default: intensity
            options: [intensity, count]
  Vector Orientation Mapping:
    description: Orientation + strain mapping from diffraction vectors (sparse point-set fit). Live refine under the crosshair.
    icon: drawing/toolbars/icons/orientation_mapping.svg
    function: spyde.actions.vector_orientation_om.vector_orientation_mapping
    signal_types: [spyde_diffraction_vectors_image]
    requires_vectors: True
    plot_dim: [2]
    toolbar_side: bottom
    navigation: False
    toggle: True

  Strain Mapping:
    description: Strain mapping from diffraction vectors (−g=g, centre-robust lattice fit). Drag the cyan reference crosshair to pick the unstrained region; toggle εxx/εyy/εxy/ω. Ellipse glyphs show the principal strains.
    icon: drawing/toolbars/icons/strain.svg
    function: spyde.actions.strain_action.strain_mapping
    signal_types: [spyde_diffraction_vectors_image]
    requires_vectors: True
    plot_dim: [2]
    toolbar_side: bottom
    navigation: False
