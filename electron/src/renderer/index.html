<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpyDE</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #11111b;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #cdd6f4;
      }
      /* Desktop-app feel: click/drag must never select text or blue-highlight
         plots/windows ("the plots get highlighted"). Re-enable selection only
         for genuine text controls. */
      :root { user-select: none; -webkit-user-select: none; }
      input, textarea, select, [contenteditable] {
        user-select: text; -webkit-user-select: text;
      }
      :focus { outline: none; }
      * { -webkit-tap-highlight-color: transparent; }

      /* Dark-themed scrollbars (Chromium) — the default white bars looked wrong
         against the dark UI. Catppuccin Mocha surfaces: track = surface0, thumb
         = surface1/overlay0 on hover. */
      * { scrollbar-color: #45475a #1e1e2e; scrollbar-width: thin; }
      ::-webkit-scrollbar { width: 11px; height: 11px; }
      ::-webkit-scrollbar-track { background: #1e1e2e; }
      ::-webkit-scrollbar-thumb {
        background: #45475a;
        border-radius: 6px;
        border: 2px solid #1e1e2e;   /* inset so the thumb reads as a pill */
      }
      ::-webkit-scrollbar-thumb:hover { background: #585b70; }
      ::-webkit-scrollbar-corner { background: #1e1e2e; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
