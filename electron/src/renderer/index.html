<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpyDE</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #11111b;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #cdd6f4;
      }
      /* Desktop-app feel: click/drag must never select text or blue-highlight
         plots/windows ("the plots get highlighted"). Re-enable selection only
         for genuine text controls. */
      :root { user-select: none; -webkit-user-select: none; }
      input, textarea, select, [contenteditable] {
        user-select: text; -webkit-user-select: text;
      }
      :focus { outline: none; }
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
