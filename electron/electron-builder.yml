# electron-builder — packages the SpyDE Electron app together with a uv-managed
# Python sidecar (DISTRIBUTION_PLAN.md "Option A"). See electron/PACKAGING.md.
#
# The Electron app is the shell; the Python backend (spyde) runs as a sidecar
# spawned over stdio. The installer stays small: it ships `uv` + the project
# source + uv.lock as extraResources, and the venv (with the GPU-correct torch
# wheel) is built on first run via `uv sync` into the user's data dir.
appId: com.directelectron.spyde
productName: SpyDE
copyright: © Direct Electron

directories:
  output: dist
  buildResources: build

# The compiled app (electron-vite output) + package manifest. node_modules are
# pulled in automatically by electron-builder for production deps.
files:
  - out/**/*
  - package.json
  - "!**/*.map"

# The Python sidecar payload — staged by scripts/bundle-python.mjs BEFORE the
# build (npm run dist does this). Lands at <app resources>/python at runtime,
# read by src/main/pythonEnv.ts.
extraResources:
  - from: resources/python
    to: python
    filter: ["**/*"]

# Icons: ONE source image (../spyde/Spyde.png, a 512x512 RGBA export of
# Spyde.svg) for every platform. electron-builder auto-generates the macOS
# .icns and the Windows .ico from this PNG at build time via its bundled
# app-builder converter — so there is no hand-maintained .ico/.icns to keep in
# sync with the artwork; re-export the PNG from Spyde.svg and all three
# platforms follow. electron-builder resolves relative to this file's directory
# (electron/), so ../ reaches the repo root.
mac:
  category: public.app-category.education
  # BOTH dmg (what users download by hand) AND zip. electron-updater CANNOT
  # auto-update from a .dmg on macOS — it needs a .zip in latest-mac.yml to apply
  # an update. A dmg-only feed made autoUpdater download the dmg it could not
  # install and then fall back to fetching the releases.atom feed, whose raw XML
  # surfaced as the "mac auto-update failed" wall of text. The zip is the update
  # payload; the dmg stays for first-time manual installs.
  target: [dmg, zip]
  icon: ../spyde/Spyde.png
  # Unsigned for now — Gatekeeper will warn; see PACKAGING.md for the
  # sign+notarize follow-up (needs an Apple Developer ID).
  identity: null

win:
  target: [nsis]
  icon: ../spyde/Spyde.png

# Per-user NSIS installer: no admin, Start-Menu + desktop shortcuts, uninstaller,
# user-chosen install dir.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target: [AppImage]
  category: Science
  # A single ≥512x512 source PNG — electron-builder generates the full Linux
  # icon set from it. (It does NOT accept the macOS .iconset naming convention
  # used by spyde/icon.iconset/ — that's icon_NxN.png; Linux wants bare NxN.png
  # in a directory, or one source image like this.)
  icon: ../spyde/Spyde.png

# Tells electron-builder where release artifacts live (GitHub Releases) and emits
# the update-feed metadata (latest.yml / latest-mac.yml / latest-linux.yml)
# alongside them — this is what electron-updater's autoUpdater reads at runtime
# (electron/src/main/updater.ts). release.yml invokes electron-builder with
# `--publish always` so these get generated and uploaded; this block alone does
# NOT publish anything (a local `npm run dist` without --publish never touches
# GitHub).
# The owner/repo here is where a LOCAL build's app-update.yml points; release.yml
# overrides both to the repo the workflow runs in (-c.publish.owner/.repo), which
# is what keeps CI publishing working before AND after the planned transfer to the
# directelectron org (README/pyproject already point there, but that repo does not
# exist yet — publishing to it 404s, which is what killed the v0.1.0 release).
publish:
  provider: github
  owner: CSSFrancis
  repo: spyde
